version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - buscar_confluence
  - search_confluence
  - faq

actions:
  - action_buscar_faq_confluence
  - action_search_confluence

responses:
  utter_greet:
    - text: "Olá! Como posso te ajudar?"

  utter_goodbye:
    - text: "Até logo!"

  utter_iamabot:
    - text: "Eu sou um assistente virtual!"

  utter_happy:
    - text: "Que bom ouvir isso! 😊"

  utter_cheer_up:
    - text: "Aqui está algo para animar você! 🎉"

  utter_did_that_help:
    - text: "Isso ajudou você?"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
